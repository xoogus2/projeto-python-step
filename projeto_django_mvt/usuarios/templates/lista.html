
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Usuários</title>
  </head>
  <body>
    <h1>Usuários cadastrados</h1>

    <ul>
      {% for usuario in usuarios %}
        <li>{{ usuario.nome }}</li>
      {% empty %}
        <li>Nenhum usuário cadastrado.</li>
      {% endfor %}
    </ul>
  </body>
</html>
